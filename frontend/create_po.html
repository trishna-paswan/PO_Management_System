<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PO 🎮 | Create PO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="layout-wrapper">
        <aside class="sidebar-container">
            <div class="sidebar">
                <div class="brand">📦 Nexus PO</div>
                <nav class="mt-4 flex-grow-1">
                    <a href="index.html" class="nav-link-custom">📊 Live Dashboard</a>
                    <a href="create_po.html" class="nav-link-custom active">🛒 New Purchase Order</a>
                    <a href="create_product.html" class="nav-link-custom">📦 Add to Catalog</a>
                </nav>
                <div class="user-widget mt-auto">
                    <button class="btn-gamified btn-danger-gamified" style="width: 100%; border-radius: 20px; font-size: 1rem;" onclick="logout()">
                        🚪 Log Out
                    </button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="page-header">
                🛒 Generate Purchase Order
            </header>

            <form id="create-po-form" class="fade-in">
                <div class="row mb-4">
                    <div class="col-lg-8">
                        <div class="emoji-card">
                            <div class="card-title">
                                📋 Line Items
                            </div>
                            
                            <div class="row mb-5">
                                <div class="col-md-6">
                                    <label class="label-gamified">🏢 Vendor Partner</label>
                                    <select class="input-bouncy" id="vendor-select" required>
                                        <option value="">⏳ Loading Vendors...</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mt-3 mt-md-0">
                                    <label class="label-gamified">🏷️ Ref # (Optional)</label>
                                    <input type="text" class="input-bouncy" id="po-ref-no" placeholder="e.g. REF-2023-A">
                                </div>
                            </div>

                            <div class="border-top border-4 border-dashed" style="border-color: #eee; margin: 40px 0;"></div>

                            <div id="product-rows-container">
                                <!-- JS Injected Rows -->
                            </div>
                            
                            <button type="button" class="btn-gamified btn-secondary-gamified w-100 mt-4" style="background: #fff; color: #444 !important; border: 4px dashed #ccc; box-shadow: none;" onclick="addProductRow()">
                                ➕ Append Line Item
                            </button>
                        </div>
                    </div>
                    
                    <div class="col-lg-4 mt-4 mt-lg-0">
                        <div class="emoji-card text-white text-center" style="position: sticky; top: 30px; background: linear-gradient(135deg, #00d2ff, #3a7bd5); border: 4px solid #fff;">
                            <h3 class="fw-bold mb-4 border-bottom border-light pb-3" style="font-weight: 900;">🧾 Order Summary</h3>
                            
                            <div class="d-flex justify-content-between mb-3 fw-bold" style="font-size: 1.1rem;">
                                <span>💸 Tax (5%)</span>
                                <span id="est-tax">$0.00</span>
                            </div>
                            <div class="d-flex justify-content-between mb-5 fw-bold" style="font-size: 1.4rem;">
                                <span>💰 Gross Total</span>
                                <span class="text-warning" style="text-shadow: 0 2px 5px rgba(0,0,0,0.3);" id="est-total">$0.00</span>
                            </div>
                            
                            <button type="submit" class="btn-gamified w-100 border-0" style="background: #ffeb3b; color: #111 !important; box-shadow: 0 10px 30px rgba(0,0,0,0.3);" id="submit-po-btn">
                                🛰️ Broadcast Order!
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
        loadVendors();
        loadProductsList().then(() => addProductRow());
    </script>
</body>
</html>
